# TelcoPilot NGINX gateway
#
# Routes:
#   /api/    → backend (the modular monolith — ONE upstream, never per-module)
#   /        → frontend (Next.js)
#
# This file is mounted into the nginx container at /etc/nginx/nginx.conf.
# The single-upstream backend is the architectural load-bearing detail:
# splitting it into per-module upstreams would silently turn this into a
# distributed system and break the in-process MediatR + domain-events contract.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;

    # Single upstream per logical service. The backend is the entire monolith.
    upstream telcopilot_backend  { server backend:8080;  keepalive 16; }
    upstream telcopilot_frontend { server frontend:3000; keepalive 16; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80 default_server;
        server_name  _;
        client_max_body_size 16m;

        # Health probe for ops dashboards
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Backend API — every module's endpoints share this single proxy.
        location /api/ {
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;

            proxy_pass http://telcopilot_backend;
        }

        # Backend health (/health) is reachable via /api/health too — handy for compose checks.
        location = /backend-health {
            proxy_pass http://telcopilot_backend/health;
        }

        # Backend Swagger UI in dev — proxy through so demos hit one origin.
        location /swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://telcopilot_backend;
        }

        # Everything else → frontend (Next.js)
        location / {
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_pass http://telcopilot_frontend;
        }
    }
}
