<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TelcoPilot — AI-Native Telco Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#06080d;
    --bg-1:#0a0e16;
    --bg-2:#0f141e;
    --bg-3:#141a26;
    --line:rgba(255,255,255,.06);
    --line-2:rgba(255,255,255,.10);
    --ink:#e7eaf0;
    --ink-2:#a8b0bd;
    --ink-3:#6a727f;
    --ink-4:#444a55;
    --accent:#00e5a0;
    --accent-dim:rgba(0,229,160,.14);
    --accent-line:rgba(0,229,160,.32);
    --warn:#ffb547;
    --crit:#ff5470;
    --info:#5b8cff;
    --ok:#00e5a0;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans:'Geist', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
  body.theme-light{
    --bg:#f6f5f0;
    --bg-1:#fbfaf6;
    --bg-2:#ffffff;
    --bg-3:#f1efe8;
    --line:rgba(0,0,0,.08);
    --line-2:rgba(0,0,0,.14);
    --ink:#1a1d24;
    --ink-2:#525864;
    --ink-3:#838894;
    --ink-4:#b6bbc5;
    --accent:#0e8b62;
    --accent-dim:rgba(14,139,98,.10);
    --accent-line:rgba(14,139,98,.28);
  }
  ::selection{background:var(--accent);color:#000}
  button{font-family:inherit}
  input,textarea{font-family:inherit;color:inherit}

  /* keyframes */
  @keyframes pulse-ring{0%{transform:scale(.6);opacity:.9}100%{transform:scale(2.2);opacity:0}}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes dash{to{stroke-dashoffset:-200}}
  @keyframes blip{0%{r:2;opacity:1}100%{r:18;opacity:0}}

  /* root app frame */
  #root{min-height:100vh;display:flex;flex-direction:column}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

  /* utility */
  .mono{font-family:var(--mono)}
  .uppr{text-transform:uppercase;letter-spacing:.08em}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 var(--ok);animation:pulse-ring 1.6s infinite}
  .dot.warn{background:var(--warn)}
  .dot.crit{background:var(--crit)}
  .dot.info{background:var(--info)}

  /* scrollbars */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
  body.theme-light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.10)}
</style>
</head>
<body class="theme-dark">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</body>
